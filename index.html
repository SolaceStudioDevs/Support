<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Repose Support</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #1a1a2e;
      color: #e8e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .container {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 15px;
      color: #9090b0;
      margin-bottom: 40px;
      line-height: 1.5;
    }

    .card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 32px 28px;
      margin-bottom: 24px;
    }

    .card p {
      font-size: 15px;
      color: #b0b0cc;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .email-link {
      display: inline-block;
      background: linear-gradient(135deg, #6c63ff, #a78bfa);
      color: #ffffff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      padding: 14px 28px;
      border-radius: 50px;
      transition: opacity 0.2s;
    }

    .email-link:hover {
      opacity: 0.85;
    }

    .footer {
      font-size: 13px;
      color: #505070;
      margin-top: 32px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">💤</div>
    <h1>Repose Support</h1>
    <p class="subtitle">We're here to help. Reach out and we'll get back to you as soon as possible.</p>

    <div class="card">
      <p>For questions, subscription issues, or anything else — send us an email and we'll respond within 1–2 business days.</p>
      <a class="email-link" href="mailto:solacestudiodevs@protonmail.com">
        Contact Support
      </a>
    </div>

    <div class="footer">
      &copy; 2026 Solace Studios &middot; Repose: Sleep Sounds
    </div>
  </div>
</body>
</html>
